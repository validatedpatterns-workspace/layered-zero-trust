---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: qtodo-verify-image
  namespace: {{ .Values.global.namespace }}
spec:
  description: This Task can be used to verify the qtodo image.

  params:
{{- include "rhtas.tasks.sigstoreParamsDesc" . | nindent 4 }}
    - description: Image to verify
      name: image
      type: string

  volumes:
{{- if .Values.rhtas.spire.enabled }}
    - name: spiffe-workload-api
      csi:
        driver: csi.spiffe.io
        readOnly: true
{{- end }}
    - name: rhtas-functions
      configMap:
        name: rhtas-functions
        defaultMode: 0755

  steps:
    - image: {{ .Values.tasks.images.cosign }}
      name: verify-image
      resources: {}
      env:
{{ include "rhtas.tasks.sigstoreEnvVars" . | nindent 8 }}
      volumeMounts:
{{- if .Values.rhtas.spire.enabled }}
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
{{- end }}
        - name: rhtas-functions
          mountPath: /usr/local/lib
          readOnly: true
      script: |
        #!/usr/bin/env bash

        source /usr/local/lib/rhtas-functions

        verify_image "$(params.image)"