---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: restart-qtodo
  namespace: {{ .Values.global.namespace }}
spec:
  description: Restart the qtodo deployment to pick up the latest built image.
  steps:
    - name: restart
      image: registry.redhat.io/openshift4/ose-tools-rhel9:latest
      resources: {}
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        if ! oc get deployment/qtodo -n qtodo >/dev/null 2>&1; then
          echo "qtodo deployment not found in namespace qtodo -- skipping restart."
          exit 0
        fi
        echo "Restarting qtodo deployment to pull the latest image..."
        oc rollout restart deployment/qtodo -n qtodo
        echo "Waiting for rollout to complete..."
        oc rollout status deployment/qtodo -n qtodo --timeout=120s
        echo "qtodo deployment restarted successfully."
