{{/*
  Pipeline Registry Auth Secret
  Purpose: Provides dockerconfigjson for pipeline to push/pull images
  Used by: Tekton pipeline tasks (build-image, sign-image, verify-image)
  Created when: registry.enabled=true
  Registry-agnostic: works for built-in Quay, BYO (quay.io, ghcr.io), or embedded OpenShift.
  Set registry.domain, registry.vaultPath, and registry.passwordVaultKey for your scenario.
*/}}
{{- $regEnabled := or .Values.registry.enabled .Values.global.registry.enabled }}
{{- $regDomain := .Values.registry.domain | default .Values.global.registry.domain }}
{{- $regUser := .Values.registry.user | default .Values.global.registry.user }}
{{- $regVaultPath := .Values.registry.vaultPath | default .Values.global.registry.vaultPath }}
{{- $regPasswordKey := .Values.registry.passwordVaultKey | default .Values.global.registry.passwordVaultKey }}
{{- if $regEnabled }}
---
apiVersion: "external-secrets.io/v1beta1"
kind: ExternalSecret
metadata:
  name: {{ .Values.registry.authSecretName }}
  namespace: {{ .Release.Namespace | default .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: {{ .Values.global.secretStore.name }}
    kind: {{ .Values.global.secretStore.kind }}
  target:
    name: {{ .Values.registry.authSecretName }}
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "{{ tpl (required "registry.domain (or global.registry.domain) is required" $regDomain) $ }}": {
                "auth": "{{ `{{ printf "%s:%s" "` }}{{ $regUser }}{{ `" .password | b64enc }}` }}"
              }
            }
          }
  data:
  - secretKey: password
    remoteRef:
      key: {{ required "registry.vaultPath (or global.registry.vaultPath) is required" $regVaultPath }}
      property: {{ required "registry.passwordVaultKey (or global.registry.passwordVaultKey) is required" $regPasswordKey }}
{{- end }}
