# Default values for supply-chain
global:
  hubClusterDomain: hub.example.com
  namespace: pipeline
  secretStore:
    name: "vault-backend"
    kind: "ClusterSecretStore"
  registry:
    enabled: false
    domain: ""
    repository: ""
    user: ""
    vaultPath: ""
    passwordVaultKey: ""

rhtas:
  enabled: false
  spire:
    enabled: true
  oidc:
    enabled: false
    clientId: ""
    clientSecretName: "rhtas-oidc-client-secret"
    clientSecretVaultPath: "secret/data/hub/infra/rhtas/rhtas-oidc-client-secret"
    clientSecretVaultKey: "client-secret"
    issuer: ""
    identity: ""

rhtpa:
  enabled: false
  url: ""
  oidc:
    enabled: true
    url: ""
    realm: "ztvp"
    clientId: "rhtpa-cli"
    clientSecretName: "qtodo-rhtpa-cli-password"
    # RHTPA OIDC CLI secret path (infra)
    clientSecretVaultPath: "secret/data/hub/infra/rhtpa/rhtpa-oidc-cli"
    clientSecretVaultKey: "client-secret"

# qtodo repository configuration
qtodo:
  repository: "https://github.com/validatedpatterns-demos/qtodo.git"
  revision: "main"
  image:
    name: "quay.io/validatedpatterns/qtodo"
    version: "latest"
  buildCmd: "./mvnw -s settings.xml package -DskipTests -Dquarkus.package.jar.type=uber-jar"
  containerfile: "./Containerfile"

# ===========================================================================
# QUAY USER PROVISIONER (only for built-in Quay registry)
# When enabled, runs a CronJob that provisions users in the built-in Quay instance.
# This is Quay-specific and not needed for BYO or embedded OpenShift registries.
# ===========================================================================
quay:
  enabled: false
  email: "quay-user@example.com"
  job:
    image: registry.access.redhat.com/ubi9/ubi:9.7-1764794285
    schedule: "*/5 * * * *"

# ===========================================================================
# REGISTRY CONFIGURATION (option-agnostic)
# Works for all registry types: built-in Quay, BYO (quay.io, ghcr.io, etc.),
# or embedded OpenShift image registry. Set the values for your scenario.
#
# Scenario-specific values (set in values-hub.yaml overrides):
#   Built-in Quay:
#     domain: quay-registry-quay-quay-enterprise.apps.<clusterDomain>
#     vaultPath: secret/data/hub/infra/quay/quay-users
#     passwordVaultKey: quay-user-password
#   BYO (quay.io, ghcr.io, etc.):
#     domain: quay.io (or your registry hostname)
#     vaultPath: secret/data/hub/infra/registry/registry-user
#     passwordVaultKey: registry-password
#   Embedded OpenShift:
#     domain: default-route-openshift-image-registry.apps.<clusterDomain>
#     vaultPath: secret/data/hub/infra/registry/registry-user
#     passwordVaultKey: registry-password
#     embeddedOpenShift.ensureImageNamespaceRBAC: true
# ===========================================================================
registry:
  # Set to true to create the registry auth secret (dockerconfigjson)
  enabled: false
  # Registry hostname (REQUIRED when enabled)
  domain: ""
  # Repository path within the registry, e.g. "ztvp/qtodo"
  # (falls back to global.registry.repository)
  repository: ""
  # Whether to verify TLS when pushing to the registry
  tlsVerify: "true"
  # Registry username (falls back to global.registry.user)
  user: ""
  # Vault path to the secret containing the registry password
  vaultPath: ""
  # Key within the Vault secret that holds the password
  passwordVaultKey: ""
  # Secret name for registry auth (dockerconfigjson)
  authSecretName: "qtodo-registry-auth"
  # Embedded OpenShift registry only: create image namespace and grant
  # pipeline SA system:image-builder so the pipeline can push. Set to true only when
  # using the in-cluster OpenShift image registry; leave false for other registries.
  embeddedOpenShift:
    ensureImageNamespaceRBAC: false
    # Service account name for the route-enabler Job
    routeEnablerServiceAccount: "registry-route-enabler"
    tokenRefresher:
      enabled: false
      schedule: "0 */6 * * *"
      tokenDuration: "172800"

# Container images used by Jobs and CronJobs (externalized for overridability)
images:
  ubi: "registry.access.redhat.com/ubi9/ubi:9.7-1764794285"
  spiffeHelper: "registry.redhat.io/zero-trust-workload-identity-manager/spiffe-helper-rhel9:v0.10.0"

# Service account name used by pipeline Jobs (CronJob, seed Job)
pipelineServiceAccount: "pipeline"

# pipeline run configuration
pipelinerun:
  # Set to true to automatically trigger a pipeline run on ArgoCD sync
  enabled: false

# spire configuration
spire:
  enabled: true
  endpointSocketPath: "/spiffe-workload-api/spire-agent.sock"

# workspaces configuration
storage:
  pvcs:
    - name: qtodo-workspace-source
      storageClass: ""
      size: "2Gi"
      accessMode: ReadWriteOnce

# tekton tasks configuration
tasks:
  images:
    cosign: "registry.access.redhat.com/ubi9/ubi:9.7-1764794285"
    mandrel: "registry.redhat.io/quarkus/mandrel-for-jdk-21-rhel8:23.1-36"
    syft: "registry.redhat.io/rh-syft-tech-preview/syft-rhel9:1.29.0"
    rhtpa: "registry.access.redhat.com/ubi9/ubi:9.7-1764794285"
