# Default values for ACS Secured Cluster Services

global:
  pattern: layered-zero-trust
  clusterDomain: cluster.local

clusterName: ""  # Will be overridden by values-hub.yaml

# Central endpoint configuration
centralEndpoint: ""  # e.g., central-stackrox.apps.cluster.example.com:443

# Init bundle secret (from Vault)
initBundle:
  useExternalSecret: true
  secretName: collector-tls
  # If not using external secret, provide bundle data
  data: ""

# Sensor configuration
sensor:
  enabled: true

  resources:
    requests:
      cpu: 500m
      memory: 500Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Admission controller configuration
admissionControl:
  enabled: true

  # Bypass configuration
  bypass:
    enabled: false

  # Enforcement mode
  listenOnCreates: true
  listenOnUpdates: true
  listenOnEvents: true

  # Timeout configuration
  timeoutSeconds: 20

  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      cpu: 500m
      memory: 500Mi

# Collector configuration
collector:
  enabled: true

  # Collection method
  #collectionMethod: CORE_BPF
  collectionMethod: EBPF  # Use EBPF instead of KernelModule

  # Image flavor
  imageFlavor: Regular

  resources:
    requests:
      cpu: 50m
      memory: 320Mi
    limits:
      cpu: 750m
      memory: 1Gi

# Scanner configuration (lightweight)
scanner:
  enabled: false

  replicas: 2

  resources:
    requests:
      cpu: 200m
      memory: 200Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Monitoring
monitoring:
  enabled: true
  openshift:
    enabled: true

# Security context
securityContext:
  runAsNonRoot: true

# Tolerations for collector DaemonSet
tolerations:
  - operator: Exists

# Node selector
nodeSelector: {}