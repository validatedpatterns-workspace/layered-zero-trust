{{- if and .Values.central.enabled .Values.central.adminPassword.useExternalSecret }}
apiVersion: "external-secrets.io/v1beta1"
kind: ExternalSecret
metadata:
  name: central-htpasswd-external-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acs-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "36"
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: {{ .Values.global.secretStore.name }}
    kind: {{ .Values.global.secretStore.kind }}
  target:
    name: {{ .Values.central.adminPassword.secretName }}
    template:
      type: Opaque
      data:
        password: "{{ `{{ .admin_password }}` }}"
  data:
  - secretKey: admin_password
    remoteRef:
      key: hub/infra/acs/acs-central
      property: admin-password
{{- end }}
