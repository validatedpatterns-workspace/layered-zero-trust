{{- if and .Values.central.enabled .Values.central.adminPassword.useExternalSecret }}
apiVersion: batch/v1
kind: Job
metadata:
  name: create-htpasswd-field
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acs-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "37"
spec:
  template:
    metadata:
      name: create-htpasswd-field
      labels:
        app: create-htpasswd-field
        {{- include "acs-central.labels" . | nindent 8 }}
    spec:
      containers:
        - image: {{ .Values.integration.keycloak.jobImage.registry }}/{{ .Values.integration.keycloak.jobImage.repository }}:{{ .Values.integration.keycloak.jobImage.tag }}
          imagePullPolicy: {{ .Values.integration.keycloak.jobImage.pullPolicy }}
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.central.adminPassword.secretName }}
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              #!/usr/bin/env bash
              set -e

              echo "🔄 Generating htpasswd entry for admin user..."

              # Check if central-htpasswd secret already has valid htpasswd field
              if oc get secret {{ .Values.central.adminPassword.secretName }} -n {{ .Release.Namespace }} -o jsonpath='{.data.htpasswd}' 2>/dev/null | base64 -d | grep -q "^admin:\$2[aby]\$"; then
                echo "✅ htpasswd entry already exists and is valid (bcrypt format)"
                exit 0
              fi

              # Generate bcrypt hash using Python crypt module
              echo "Generating bcrypt hash with Python..."
              HTPASSWD_ENTRY=$(python3 -c "
              import crypt
              import os
              password = os.environ.get('PASSWORD', '')
              salt = crypt.mksalt(crypt.METHOD_BLOWFISH)
              hash_value = crypt.crypt(password, salt)
              print(f'admin:{hash_value}')
              ")

              echo "✅ htpasswd entry generated"

              # Patch the secret to add/update htpasswd field
              oc patch secret {{ .Values.central.adminPassword.secretName }} -n {{ .Release.Namespace }} --type merge -p "{\"data\":{\"htpasswd\":\"$(echo -n "$HTPASSWD_ENTRY" | base64 -w0)\"}}"

              echo "✅ {{ .Values.central.adminPassword.secretName }} secret updated with htpasswd field"
          name: create-htpasswd-field
      dnsPolicy: ClusterFirst
      restartPolicy: OnFailure
      serviceAccount: {{ .Values.integration.keycloak.serviceAccountName }}
      serviceAccountName: {{ .Values.integration.keycloak.serviceAccountName }}
      terminationGracePeriodSeconds: 30
{{- end }}
